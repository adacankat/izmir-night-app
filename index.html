<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Should I Go Out in Izmir Tonight?</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e1e2f, #3b2f63);
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .app {
      background: rgba(255, 255, 255, 0.1);
      padding: 30px;
      border-radius: 20px;
      max-width: 700px;
      width: 100%;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
    }

    .subtitle {
      text-align: center;
      color: #ddd;
      margin-bottom: 25px;
    }

    label {
      display: block;
      margin-top: 15px;
      margin-bottom: 5px;
      font-weight: bold;
    }

    select {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
    }

    button {
      width: 100%;
      margin-top: 25px;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #ff4f8b;
      color: white;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #ff2f76;
    }

    .reset {
      background: #777;
      margin-top: 10px;
    }

    .result {
      margin-top: 25px;
      padding: 20px;
      border-radius: 15px;
      background: rgba(255,255,255,0.18);
      display: none;
    }

    .result h2 {
      margin-top: 0;
      color: #ffd166;
    }

    .logic {
      margin-top: 10px;
      font-size: 14px;
      color: #ddd;
      line-height: 1.5;
    }
  </style>
</head>

<body>
  <div class="app">
    <h1>Should I Go Out in Izmir Tonight?</h1>
    <p class="subtitle">
      A local recommendation app for university students in Izmir.
    </p>

    <label for="budget">1. Budget</label>
    <select id="budget">
      <option value="">Choose one</option>
      <option value="B1">Broke</option>
      <option value="B2">Normal</option>
      <option value="B3">Comfortable</option>
    </select>

    <label for="energy">2. Energy Level</label>
    <select id="energy">
      <option value="">Choose one</option>
      <option value="E1">Low</option>
      <option value="E2">Medium</option>
      <option value="E3">High</option>
    </select>

    <label for="responsibility">3. Tomorrow Responsibility</label>
    <select id="responsibility">
      <option value="">Choose one</option>
      <option value="R1">None</option>
      <option value="R2">Class</option>
      <option value="R3">Exam / Deadline</option>
    </select>

    <label for="vibe">4. Preferred Vibe</label>
    <select id="vibe">
      <option value="">Choose one</option>
      <option value="V1">Chill Cafe</option>
      <option value="V2">Social Bar</option>
      <option value="V3">Seaside Walk</option>
      <option value="V4">Nightlife / Party</option>
    </select>

    <label for="distance">5. Distance Willingness</label>
    <select id="distance">
      <option value="">Choose one</option>
      <option value="D1">Near / Bornova</option>
      <option value="D2">Medium / Alsancak</option>
      <option value="D3">Far / Karsiyaka-Bostanli</option>
    </select>

    <button onclick="getRecommendation()">Get Recommendation</button>
    <button class="reset" onclick="resetApp()">Reset</button>

    <div id="result" class="result">
      <h2 id="outputTitle"></h2>
      <p id="outputText"></p>
      <p id="logicText" class="logic"></p>
    </div>
  </div>

  <script>
    function getRecommendation() {
      const B = document.getElementById("budget").value;
      const E = document.getElementById("energy").value;
      const R = document.getElementById("responsibility").value;
      const V = document.getElementById("vibe").value;
      const D = document.getElementById("distance").value;

      if (!B || !E || !R || !V || !D) {
        alert("Please answer all 5 questions before getting your recommendation.");
        return;
      }

      let scores = {
        O1: 0,
        O2: 0,
        O3: 0,
        O4: 0,
        O5: 0,
        O6: 0,
        O7: 0,
        O8: 0
      };

      let rules = [];

      // Budget rules
      if (B === "B1") {
        scores.O1 += 2;
        scores.O2 += 2;
        scores.O3 += 2;
        rules.push("B1: low budget increases stay-in, Bornova cafe, and low-cost walk scores.");
      }

      if (B === "B2") {
        scores.O4 += 2;
        scores.O5 += 1;
        scores.O7 += 1;
        rules.push("B2: normal budget supports social or controlled plans.");
      }

      if (B === "B3") {
        scores.O6 += 3;
        scores.O4 += 1;
        rules.push("B3: comfortable budget supports nightlife and social plans.");
      }

      // Energy rules
      if (E === "E1") {
        scores.O1 += 3;
        scores.O8 += 3;
        rules.push("E1: low energy increases stay-in and reset-night scores.");
      }

      if (E === "E2") {
        scores.O2 += 1;
        scores.O3 += 1;
        scores.O4 += 2;
        scores.O7 += 1;
        rules.push("E2: medium energy supports moderate plans.");
      }

      if (E === "E3") {
        scores.O5 += 2;
        scores.O6 += 3;
        scores.O4 += 1;
        rules.push("E3: high energy supports seaside night or nightlife.");
      }

      // Responsibility rules
      if (R === "R1") {
        scores.O5 += 2;
        scores.O6 += 2;
        scores.O4 += 1;
        rules.push("R1: no responsibility tomorrow allows bigger plans.");
      }

      if (R === "R2") {
        scores.O2 += 2;
        scores.O7 += 2;
        scores.O8 += 2;
        rules.push("R2: class tomorrow supports chill, limited, or reset plans.");
      }

      if (R === "R3") {
        scores.O1 += 4;
        scores.O7 += 3;
        scores.O8 += 2;
        rules.push("R3: exam/deadline strongly limits going out.");
      }

      // Vibe rules
      if (V === "V1") {
        scores.O2 += 4;
        scores.O8 += 1;
        rules.push("V1: chill cafe mood strongly supports Bornova cafe.");
      }

      if (V === "V2") {
        scores.O4 += 4;
        scores.O7 += 2;
        rules.push("V2: social bar mood supports Alsancak or limited social plan.");
      }

      if (V === "V3") {
        scores.O3 += 3;
        scores.O5 += 4;
        rules.push("V3: seaside mood supports walk or Bostanli/Karsiyaka plan.");
      }

      if (V === "V4") {
        scores.O6 += 4;
        scores.O7 += 1;
        scores.O1 += 1;
        rules.push("V4: nightlife mood supports full nightlife only if other conditions are strong.");
      }

      // Distance rules
      if (D === "D1") {
        scores.O2 += 3;
        scores.O3 += 2;
        scores.O8 += 1;
        rules.push("D1: near distance supports Bornova, low-cost, or reset plans.");
      }

      if (D === "D2") {
        scores.O4 += 3;
        scores.O6 += 1;
        scores.O7 += 1;
        rules.push("D2: medium distance supports Alsancak and controlled plans.");
      }

      if (D === "D3") {
        scores.O5 += 4;
        scores.O6 += 1;
        rules.push("D3: far distance supports Karsiyaka/Bostanli seaside plan.");
      }

      // Strong override rules
      if (B === "B1" && E === "E1" && R === "R3") {
        scores.O1 += 6;
        rules.push("Override L1: B1 ∧ E1 ∧ R3 → O1.");
      }

      if (V === "V4" && E === "E3" && B === "B3" && R === "R1") {
        scores.O6 += 6;
        rules.push("Override L6: V4 ∧ E3 ∧ B3 ∧ R1 → O6.");
      }

      if (R === "R3" && (V === "V2" || V === "V4")) {
        scores.O7 += 5;
        rules.push("Override L7: R3 with social/nightlife vibe → O7.");
      }

      let bestOutput = Object.keys(scores).reduce((a, b) => scores[a] >= scores[b] ? a : b);

      const recommendations = {
        O1: {
          title: "Stay in - not worth going out tonight",
          text: "Your current situation makes going out too risky. Saving your energy, money, and focus is the smarter decision tonight."
        },
        O2: {
          title: "Go to a chill cafe in Bornova",
          text: "A nearby, low-pressure cafe plan fits your budget, energy, and distance better than a big night out."
        },
        O3: {
          title: "Short seaside walk or low-cost plan",
          text: "You want to go out, but the safest option is something simple, cheap, and not too tiring."
        },
        O4: {
          title: "Go to Alsancak for social bars",
          text: "Your answers support a social night out, but not necessarily a full party plan. Alsancak is the balanced choice."
        },
        O5: {
          title: "Go to Bostanli or Karsiyaka for a seaside night",
          text: "Your mood and distance preference fit a longer seaside plan. This is a good option if you want a more atmospheric night."
        },
        O6: {
          title: "Full nightlife plan - tonight is worth it",
          text: "Your energy, budget, and schedule support a bigger night out. This is the strongest green-light result."
        },
        O7: {
          title: "Go out but set a strict time and budget limit",
          text: "You can go out, but your responsibility level means the plan should be controlled, short, and not too expensive."
        },
        O8: {
          title: "Stay in and do a relaxing reset night",
          text: "You do not need a full plan tonight. Resting, resetting, and keeping the night calm fits your situation best."
        }
      };

      document.getElementById("outputTitle").textContent = recommendations[bestOutput].title;
      document.getElementById("outputText").textContent = recommendations[bestOutput].text;
      document.getElementById("logicText").innerHTML =
        "Selected output: " + bestOutput + "<br>" +
        "Score summary: " + JSON.stringify(scores) + "<br><br>" +
        "Rules triggered:<br>" + rules.join("<br>");

      document.getElementById("result").style.display = "block";
    }

    function resetApp() {
      document.getElementById("budget").value = "";
      document.getElementById("energy").value = "";
      document.getElementById("responsibility").value = "";
      document.getElementById("vibe").value = "";
      document.getElementById("distance").value = "";
      document.getElementById("result").style.display = "none";
    }
  </script>
</body>
</html>
